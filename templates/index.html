<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewChat()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>
            
            <!-- Search -->
            <div class="sidebar-search">
                <div class="search-input-wrapper">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search conversations..." oninput="searchConversations(this.value)">
                </div>
            </div>
            
            <!-- Conversations List -->
            <div class="conversations-list" id="conversationsList">
                <!-- Conversations will be loaded here -->
            </div>
            
            <!-- User Profile -->
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">{{ username[0].upper() }}</div>
                    <span class="user-name">{{ username }}</span>
                    <button class="logout-btn" onclick="logout()" title="Logout">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>
        
        <!-- Main Chat Area -->
        <main class="main-content">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 class="app-title">AI Assistant</h1>
                <div class="header-spacer"></div>
            </header>
            
            <!-- Chat Container -->
            <div class="chat-container" id="chatContainer">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-content">
                        <div class="welcome-logo">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                                <path d="M2 17l10 5 10-5"></path>
                                <path d="M2 12l10 5 10-5"></path>
                            </svg>
                        </div>
                        <h1>How can I help you today?</h1>
                        <p>I can assist with coding, writing, analysis, and much more.</p>
                        
                        <div class="suggestion-cards">
                            <button class="suggestion-card" onclick="sendSuggestion('Write a Python function to sort a list')">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="16 18 22 12 16 6"></polyline>
                                    <polyline points="8 6 2 12 8 18"></polyline>
                                </svg>
                                <span>Write a Python function to sort a list</span>
                            </button>
                            <button class="suggestion-card" onclick="sendSuggestion('Explain how machine learning works')">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                                <span>Explain how machine learning works</span>
                            </button>
                            <button class="suggestion-card" onclick="sendSuggestion('Help me write a professional email')">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                                <span>Help me write a professional email</span>
                            </button>
                            <button class="suggestion-card" onclick="sendSuggestion('What can you help me with?')">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                                </svg>
                                <span>What can you help me with?</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Messages Container -->
                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will be inserted here -->
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="input-area">
                <form class="input-form" id="chatForm" onsubmit="sendMessage(event)">
                    <div class="input-wrapper">
                        <textarea 
                            id="messageInput" 
                            placeholder="Message AI Assistant..." 
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                        <button type="submit" class="send-btn" id="sendBtn" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </form>
                <p class="disclaimer">AI Assistant can make mistakes. Consider verifying important information.</p>
            </div>
        </main>
    </div>
    
    <!-- Search Results Modal -->
    <div class="modal" id="searchModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Search Results</h2>
                <button class="close-modal" onclick="closeSearchModal()">&times;</button>
            </div>
            <div class="modal-body" id="searchResults">
                <!-- Search results will appear here -->
            </div>
        </div>
    </div>
    
    <script>
        // State
        let currentConversationId = null;
        let isLoading = false;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadConversations();
            setupMessageInput();
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                },
                breaks: true,
                gfm: true
            });
        });
        
        // Setup message input
        function setupMessageInput() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            
            input.addEventListener('input', () => {
                sendBtn.disabled = !input.value.trim();
            });
        }
        
        // Auto resize textarea
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }
        
        // Handle keyboard shortcuts
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage(event);
            }
        }
        
        // Toggle sidebar on mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }
        
        // Create new chat
        async function createNewChat() {
            try {
                const response = await fetch('/api/conversations/new', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    currentConversationId = data.conversation_id;
                    clearChat();
                    document.getElementById('welcomeScreen').style.display = 'flex';
                    document.getElementById('messagesContainer').innerHTML = '';
                    loadConversations();
                    
                    // Close sidebar on mobile
                    document.getElementById('sidebar').classList.remove('open');
                }
            } catch (error) {
                console.error('Error creating new chat:', error);
            }
        }
        
        // Load conversations
        async function loadConversations() {
            try {
                const response = await fetch('/api/conversations');
                const data = await response.json();
                
                if (data.success) {
                    renderConversations(data.conversations);
                }
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }
        
        // Render conversations in sidebar
        function renderConversations(conversations) {
            const container = document.getElementById('conversationsList');
            
            if (!conversations || conversations.length === 0) {
                container.innerHTML = '<div class="no-conversations">No conversations yet</div>';
                return;
            }
            
            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item ${conv.id === currentConversationId ? 'active' : ''}" 
                     onclick="loadConversation('${conv.id}')">
                    <svg class="conversation-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span class="conversation-title">${escapeHtml(conv.title)}</span>
                    <button class="delete-conv-btn" onclick="deleteConversation(event, '${conv.id}')" title="Delete">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            `).join('');
        }
        
        // Load a specific conversation
        async function loadConversation(conversationId) {
            currentConversationId = conversationId;
            
            try {
                const response = await fetch(`/api/history?conversation_id=${conversationId}`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('welcomeScreen').style.display = 'none';
                    renderMessages(data.history);
                    loadConversations(); // Refresh to update active state
                    
                    // Close sidebar on mobile
                    document.getElementById('sidebar').classList.remove('open');
                }
            } catch (error) {
                console.error('Error loading conversation:', error);
            }
        }
        
        // Delete conversation
        async function deleteConversation(event, conversationId) {
            event.stopPropagation();
            
            if (!confirm('Delete this conversation?')) return;
            
            try {
                await fetch(`/api/conversations/${conversationId}`, { method: 'DELETE' });
                
                if (conversationId === currentConversationId) {
                    createNewChat();
                }
                
                loadConversations();
            } catch (error) {
                console.error('Error deleting conversation:', error);
            }
        }
        
        // Render messages
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            container.innerHTML = messages.map(msg => createMessageHTML(msg.role, msg.content)).join('');
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
            
            // Apply syntax highlighting
            document.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });
        }
        
        // Create message HTML
        function createMessageHTML(role, content) {
            const isUser = role === 'user';
            const avatar = isUser ? '{{ username[0].upper() }}' : 'AI';
            const parsedContent = isUser ? escapeHtml(content) : marked.parse(content);
            
            return `
                <div class="message ${isUser ? 'user-message' : 'assistant-message'}">
                    <div class="message-avatar ${isUser ? 'user-avatar' : 'ai-avatar'}">${avatar}</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-sender">${isUser ? 'You' : 'AI Assistant'}</span>
                        </div>
                        <div class="message-text">${parsedContent}</div>
                        ${!isUser ? `
                            <div class="message-actions">
                                <button class="action-btn" onclick="copyMessage(this)" title="Copy">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                </button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }
        
        // Send message
        async function sendMessage(event) {
            event.preventDefault();
            
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isLoading) return;
            
            // Create new conversation if needed
            if (!currentConversationId) {
                const response = await fetch('/api/conversations/new', { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    currentConversationId = data.conversation_id;
                }
            }
            
            // Hide welcome screen
            document.getElementById('welcomeScreen').style.display = 'none';
            
            // Add user message to UI
            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.innerHTML += createMessageHTML('user', message);
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('sendBtn').disabled = true;
            
            // Show loading indicator
            isLoading = true;
            const loadingId = 'loading-' + Date.now();
            messagesContainer.innerHTML += `
                <div class="message assistant-message" id="${loadingId}">
                    <div class="message-avatar ai-avatar">AI</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-sender">AI Assistant</span>
                        </div>
                        <div class="typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            `;
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: currentConversationId
                    })
                });
                
                const data = await response.json();
                
                // Remove loading indicator
                document.getElementById(loadingId)?.remove();
                
                if (data.success) {
                    // Add AI response
                    messagesContainer.innerHTML += createMessageHTML('assistant', data.response);
                    
                    // Apply syntax highlighting
                    document.querySelectorAll('pre code').forEach(block => {
                        hljs.highlightElement(block);
                    });
                    
                    // Refresh conversations
                    loadConversations();
                } else {
                    messagesContainer.innerHTML += createMessageHTML('assistant', 'Sorry, something went wrong. Please try again.');
                }
            } catch (error) {
                document.getElementById(loadingId)?.remove();
                messagesContainer.innerHTML += createMessageHTML('assistant', 'Connection error. Please check your internet and try again.');
            }
            
            isLoading = false;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Send suggestion
        function sendSuggestion(text) {
            document.getElementById('messageInput').value = text;
            document.getElementById('sendBtn').disabled = false;
            sendMessage(new Event('submit'));
        }
        
        // Search conversations
        async function searchConversations(query) {
            if (!query.trim()) {
                loadConversations();
                return;
            }
            
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.success && data.results.length > 0) {
                    showSearchResults(data.results);
                }
            } catch (error) {
                console.error('Error searching:', error);
            }
        }
        
        // Show search results
        function showSearchResults(results) {
            const modal = document.getElementById('searchModal');
            const container = document.getElementById('searchResults');
            
            container.innerHTML = results.map(result => `
                <div class="search-result-item">
                    <div class="result-role">${result.role === 'user' ? 'You' : 'AI'}</div>
                    <div class="result-content">${escapeHtml(result.content.substring(0, 200))}...</div>
                </div>
            `).join('');
            
            modal.style.display = 'flex';
        }
        
        // Close search modal
        function closeSearchModal() {
            document.getElementById('searchModal').style.display = 'none';
        }
        
        // Copy message
        function copyMessage(button) {
            const messageText = button.closest('.message-content').querySelector('.message-text').innerText;
            navigator.clipboard.writeText(messageText).then(() => {
                button.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                `;
                setTimeout(() => {
                    button.innerHTML = `
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    `;
                }, 2000);
            });
        }
        
        // Clear chat
        function clearChat() {
            document.getElementById('messagesContainer').innerHTML = '';
        }
        
        // Logout
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Logout error:', error);
            }
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
